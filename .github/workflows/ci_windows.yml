name: CI (Windows)

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - develop
  workflow_dispatch:

jobs:
  tests_windows:
    runs-on: "windows-latest"
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: dartsort
      
      - name: Fetch tags and describe
        run: pushd dartsort/ && git fetch --prune --unshallow --tags && git describe && popd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip' # caching pip dependencies
          
      - name: Install dependencies
        run: |
          python -m pip install -U pip  # seems necessary to make sure pip is my pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch
          pip install -e dartsort/[full]
          pip install --upgrade git+https://github.com/SpikeInterface/spikeinterface.git@main  # test against SI tip

      - name: pytest
        run: |
          PYTHONFAULTHANDLER=1 pytest  --cache-clear --maxfail=30 --log-level=15 dartsort/tests/
